<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <meta
        name="description"
        content="Abhyasika Management System for Shri Laxmikeshav Pratisthan, Satara."
    >

    <title>

        {% block title %}
        Abhyasika Management System
        {% endblock %}

    </title>

    <!-- Bootstrap CSS -->

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <!-- Bootstrap Icons -->

    <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    >

    <!-- Google Font -->

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
        rel="stylesheet"
    >

    <!-- Custom CSS -->

    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='css/style.css') }}"
    >

    {% block css %}
    {% endblock %}

</head>

<body>

    <div class="app-wrapper">

        <!-- Sidebar -->

        {% include "includes/sidebar.html" %}

        <!-- Main Content -->

        <div class="main-content">

            <!-- Navbar -->

            {% include "includes/navbar.html" %}

            <!-- Page -->

            <main class="page-content">

                <div class="page-container">

                    {% include "includes/flash_messages.html" %}

                    {% block content %}
                    {% endblock %}

                </div>

            </main>

            <!-- Footer -->

            {% include "includes/footer.html" %}

        </div>

    </div>

    <!-- Bootstrap JS -->

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Current User -->

    <script>

        const currentUserName = "{{ current_user.name }}";

    </script>

    <!-- Custom JS -->

    <script
        src="{{ url_for('static', filename='js/script.js') }}"
    ></script>

    <script>

    document.addEventListener("DOMContentLoaded", function () {

        document.querySelectorAll("#sidebarMenu .nav-link").forEach(function(link) {

            link.addEventListener("click", function () {

                const sidebarElement = document.getElementById("sidebarMenu");

                const sidebar = bootstrap.Offcanvas.getInstance(sidebarElement);

                if (sidebar) {

                    sidebar.hide();

                }

            });

        });

    });

    </script>

    {% block js %}
    {% endblock %}

</body>

</html>
