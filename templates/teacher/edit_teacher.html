{% extends "base.html" %}

{% block title %}

Edit Teacher

{% endblock %}

{% block content %}

<div class="d-flex justify-content-between align-items-center mb-4">

    <div>

        <h2 class="fw-bold">

            <i class="bi bi-pencil-square text-warning"></i>

            Edit Teacher

        </h2>

        <p class="text-muted mb-0">

            Update teacher information.

        </p>

    </div>

    <a
        href="{{ url_for('teacher_management.view_teachers') }}"
        class="btn btn-outline-secondary"
    >

        <i class="bi bi-arrow-left"></i>

        Back

    </a>

</div>

<form method="POST">

    <!-- ==========================================
         Teacher Information
    =========================================== -->

    <div class="card form-card border-0 shadow-sm rounded-4">

        <div class="card-body p-4">

            <div class="form-section-title">

                <i class="bi bi-person-vcard-fill"></i>

                Teacher Information

            </div>

            <div class="row">

                <!-- Full Name -->

                <div class="col-md-6 mb-4">

                    <label class="form-label">

                        Full Name

                    </label>

                    <input
                        type="text"
                        name="name"
                        class="form-control"
                        value="{{ teacher.name }}"
                        required
                    >

                </div>

                <!-- Mobile -->

                <div class="col-md-6 mb-4">

                    <label class="form-label">

                        Mobile Number

                    </label>

                    <input
                        type="tel"
                        id="mobile"
                        name="mobile"
                        class="form-control"
                        value="{{ teacher.mobile }}"
                        maxlength="10"
                        required
                    >

                    <div
                        id="mobileHelp"
                        class="form-text"
                    >

                        Mobile number must contain exactly 10 digits.

                    </div>

                </div>

                <!-- Email -->

                <div class="col-md-6 mb-4">

                    <label class="form-label">

                        Email Address

                    </label>

                    <input
                        type="email"
                        name="email"
                        class="form-control"
                        value="{{ teacher.email }}"
                    >

                </div>

                <!-- Username -->

                <div class="col-md-6 mb-4">

                    <label class="form-label">

                        Username

                    </label>

                    <input
                        type="text"
                        name="username"
                        class="form-control"
                        value="{{ teacher.username }}"
                        required
                    >

                </div>

            </div>

        </div>

    </div>

    <!-- ==========================================
         Buttons
    =========================================== -->

    <div class="d-flex justify-content-end gap-2 mt-4">

        <a
            href="{{ url_for('teacher_management.view_teachers') }}"
            class="btn btn-outline-secondary"
        >

            Cancel

        </a>

        <button
            type="submit"
            class="btn btn-warning"
        >

            <i class="bi bi-check-circle-fill me-2"></i>

            Update Teacher

        </button>

    </div>

</form>

<script>

/* ==========================================
   Mobile Validation
========================================== */

const mobileInput = document.getElementById("mobile");

const mobileHelp = document.getElementById("mobileHelp");

mobileInput.addEventListener(

    "input",

    function(){

        this.value = this.value.replace(/\D/g,'');

        if(this.value.length === 10){

            this.classList.remove("is-invalid");

            this.classList.add("is-valid");

            mobileHelp.innerHTML =

                "✓ Valid mobile number";

            mobileHelp.className =

                "text-success";

        }

        else{

            this.classList.remove("is-valid");

            this.classList.add("is-invalid");

            mobileHelp.innerHTML =

                "Mobile number must contain exactly 10 digits.";

            mobileHelp.className =

                "text-danger";

        }

    }

);

</script>

{% endblock %}
