<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Select Abhyasika</title>

    <!-- Bootstrap -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- Bootstrap Icons -->

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <!-- Google Font -->

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
          rel="stylesheet">

    <!-- Main CSS -->

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body class="login-page">

<div class="selection-wrapper">

    <div class="selection-card">

        <!-- Logo -->

        <div class="selection-logo">

            <img src="{{ url_for('static', filename='images/logo-icon.png') }}"
                 alt="NGO Logo">

        </div>

        <!-- Heading -->

        <h1 class="selection-title">

            Select Abhyasika

        </h1>

        <p class="selection-subtitle">

            Choose the study centre you want to manage for this session.

        </p>

        <!-- Information -->

        <div class="selection-info">

            <i class="bi bi-info-circle-fill"></i>

            <span>

                Multiple Abhyasikas are assigned to your account.

            </span>

        </div>

        <form method="POST">

            {% for assignment in assignments %}

            <label class="abhyasika-option">

                <input
                    type="radio"
                    name="abhyasika_id"
                    value="{{ assignment.abhyasika_id }}"
                    required
                >

                <div class="option-content">

                    <div>

                        <h5>

                            {{ assignment.abhyasika.name }}

                        </h5>

                        <small>

                            Study Centre

                        </small>

                    </div>

                    <i class="bi bi-building"></i>

                </div>

            </label>

            {% endfor %}

            <button
                class="btn btn-primary btn-lg w-100 mt-4"
                type="submit">

                <i class="bi bi-arrow-right-circle me-2"></i>

                Continue

            </button>

        </form>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
