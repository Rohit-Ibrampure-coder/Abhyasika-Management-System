<!DOCTYPE html>
<html lang="en" data-bs-theme="light">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>

        Login | Abhyasika Management System

    </title>

    <!-- Bootstrap -->

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <!-- Bootstrap Icons -->

    <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    >

    <!-- Google Font -->

    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap"
        rel="stylesheet"
    >

    <!-- Main CSS -->

    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='css/style.css') }}"
    >

</head>

<body class="login-page">

<div class="container-fluid">

<div class="row min-vh-100">

    <!-- LEFT SIDE -->

    <div class="col-lg-6 d-none d-lg-flex login-left">

        <div class="login-content">

            <div class="logo-circle mb-4">

                <i class="bi bi-book-half"></i>

            </div>

            <h1 class="fw-bold">

                Abhyasika Management System

            </h1>

            <p class="lead mt-4">

                Empowering Education Through Technology

            </p>

            <p class="mt-3 opacity-75">

                Manage students, attendance, teachers,
                reports and administration from one secure,
                modern platform.

            </p>

        </div>

    </div>

    <!-- RIGHT SIDE -->

    <div class="col-lg-6 d-flex align-items-center justify-content-center">

        <div class="login-card">

            <h2 class="fw-bold text-center mb-2">

                Welcome Back

            </h2>

            <p class="text-center text-muted mb-4">

                Sign in to continue

            </p>

            {% include "includes/flash_messages.html" %}

            <form method="POST">

                <div class="mb-3">

                    <label class="form-label">

                        Username

                    </label>

                    <div class="input-group">

                        <span class="input-group-text">

                            <i class="bi bi-person"></i>

                        </span>

                        <input
                            type="text"
                            class="form-control"
                            name="username"
                            placeholder="Enter username"
                            required
                        >

                    </div>

                </div>

                <div class="mb-4">

                    <label class="form-label">

                        Password

                    </label>

                    <div class="input-group">

                        <span class="input-group-text">

                            <i class="bi bi-lock"></i>

                        </span>

                        <input
                            type="password"
                            id="password"
                            class="form-control"
                            name="password"
                            placeholder="Enter password"
                            required
                        >

                        <button
                            class="btn btn-outline-secondary"
                            type="button"
                            id="togglePassword"
                        >

                            <i
                                class="bi bi-eye"
                                id="eyeIcon"
                            ></i>

                        </button>

                    </div>

                </div>

                <div
                    class="d-flex justify-content-between align-items-center mb-4"
                >

                    <div class="form-check">

                        <input
                            class="form-check-input"
                            type="checkbox"
                            id="remember"
                        >

                        <label
                            class="form-check-label"
                            for="remember"
                        >

                            Remember Me

                        </label>

                    </div>

                </div>

                <button
                    class="btn btn-primary w-100 py-3"
                    type="submit"
                >

                    <i class="bi bi-box-arrow-in-right me-2"></i>

                    Login

                </button>

            </form>

        </div>

    </div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

<script src="{{ url_for('static', filename='js/script.js') }}"></script>

<script>

const password=document.getElementById("password");

const toggle=document.getElementById("togglePassword");

const eye=document.getElementById("eyeIcon");

toggle.addEventListener("click",function(){

if(password.type==="password"){

password.type="text";

eye.className="bi bi-eye-slash";

}

else{

password.type="password";

eye.className="bi bi-eye";

}

});

</script>

</body>

</html>
