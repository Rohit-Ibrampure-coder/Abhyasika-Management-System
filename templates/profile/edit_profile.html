{% extends "base.html" %}

{% block title %}
Edit Profile
{% endblock %}

{% block content %}

<div class="container-fluid">

    <div class="row justify-content-center">

        <div class="col-lg-8">

            <div class="card shadow-sm border-0">

                <div class="card-header bg-primary text-white">

                    <h4 class="mb-0">

                        <i class="bi bi-pencil-square me-2"></i>

                        Edit Profile

                    </h4>

                </div>

                <div class="card-body">

                    <form method="POST">

                        <div class="mb-3">

                            <label class="form-label">

                                Full Name

                            </label>

                            <input
                                type="text"
                                name="name"
                                class="form-control"
                                value="{{ current_user.name }}"
                                required
                            >

                        </div>

                        <div class="mb-3">

                            <label class="form-label">

                                Username

                            </label>

                            <input
                                type="text"
                                class="form-control"
                                value="{{ current_user.username }}"
                                readonly
                            >

                        </div>

                        <div class="mb-3">

                            <label class="form-label">

                                Mobile Number

                            </label>

                            <input
                                type="tel"
                                name="mobile"
                                class="form-control"
                                value="{{ current_user.mobile or '' }}"
                                placeholder="Enter 10-digit mobile number"
                                pattern="[6-9]{1}[0-9]{9}"
                                maxlength="10"
                                minlength="10"
                                inputmode="numeric"
                                required
                            >

                            <div class="form-text">

                                Enter a valid 10-digit Indian mobile number.

                            </div>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">

                                Email Address

                            </label>

                            <input
                                type="email"
                                name="email"
                                class="form-control"
                                value="{{ current_user.email or '' }}"
                            >

                        </div>

                        <div class="d-flex justify-content-between">

                            <a
                                href="{{ url_for('profile.my_profile') }}"
                                class="btn btn-secondary"
                            >

                                Back

                            </a>

                            <button
                                type="submit"
                                class="btn btn-primary"
                            >

                                Save Changes

                            </button>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
