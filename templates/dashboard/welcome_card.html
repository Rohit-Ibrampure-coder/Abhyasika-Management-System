<div class="card welcome-card shadow-sm border-0 mb-4">

    <div class="card-body p-4">

        <div class="row align-items-center">

            <div class="col-lg-8">

                <h2
                    class="fw-bold mb-2"
                    id="welcomeGreeting"
                >

                    Welcome

                </h2>

                <div class="mb-3">

                    {% if current_user.role == "admin" %}

                    <span class="badge bg-primary">

                        Administrator

                    </span>

                    {% else %}

                    <span class="badge bg-success">

                        Teacher

                    </span>

                    {% endif %}

                </div>

                <h5 class="fw-semibold">

                    {{ APP_NAME }}

                </h5>

                <p class="text-muted mb-2">

                    {{ APP_TAGLINE }}

                </p>

                <p class="mb-0">

                    Have a productive and successful day.

                </p>

            </div>

            <div
                class="col-lg-4 text-lg-end mt-4 mt-lg-0"
            >

                <h5
                    class="fw-bold"
                    id="currentDate"
                >

                </h5>

                <span
                    class="badge bg-success mt-2"
                >

                    <i class="bi bi-circle-fill me-1"></i>

                    Active

                </span>

            </div>

        </div>

    </div>

</div>
