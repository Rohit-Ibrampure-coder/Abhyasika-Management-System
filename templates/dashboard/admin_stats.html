<div class="row g-4 stats-grid">

    <!-- ==========================
         Total Students
    ========================== -->
    <div class="col-xl-3 col-md-6">
        <a href="{{ url_for('student.view_students') }}" class="text-decoration-none">

            <div class="card stats-card">

                <div class="card-body">

                    <div class="stats-content">

                        <p class="stats-label">

                            Total Students

                        </p>

                        <h2 class="stats-number">

                            {{ total_students }}

                        </h2>

                        <span class="stats-footer">

                            View Students

                            <i class="bi bi-arrow-right"></i>

                        </span>

                    </div>

                    <div class="stats-icon students-icon">

                        <i class="bi bi-people-fill"></i>

                    </div>

                </div>

            </div>

        </a>
    </div>

    <!-- ==========================
         Total Teachers
    ========================== -->

    <div class="col-xl-3 col-md-6">
    
        <a href="{{ url_for('teacher_management.view_teachers') }}" class="text-decoration-none">
    
            <div class="card stats-card">
    
                <div class="card-body">
    
                    <div class="stats-content">
    
                        <p class="stats-label">
    
                            Total Teachers
    
                        </p>
    
                        <h2 class="stats-number">
    
                            {{ total_teachers }}
    
                        </h2>
    
                        <span class="stats-footer">
    
                            View Teachers
    
                            <i class="bi bi-arrow-right"></i>
    
                        </span>
    
                    </div>
    
                    <div class="stats-icon teachers-icon">
    
                        <i class="bi bi-person-workspace"></i>
    
                    </div>
    
                </div>
    
            </div>
    
        </a>
    </div>

    <!-- ==========================
         Total Abhyasikas
    ========================== -->

    <div class="col-xl-3 col-md-6">
    
        <a href="{{ url_for('admin.view_abhyasikas') }}" class="text-decoration-none">
    
            <div class="card stats-card">
    
                <div class="card-body">
    
                    <div class="stats-content">
    
                        <p class="stats-label">
    
                            Abhyasikas
    
                        </p>
    
                        <h2 class="stats-number">
    
                            {{ total_abhyasikas }}
    
                        </h2>
    
                        <span class="stats-footer">
    
                            View Centers
    
                            <i class="bi bi-arrow-right"></i>
    
                        </span>
    
                    </div>
    
                    <div class="stats-icon abhyasika-icon">
    
                        <i class="bi bi-building"></i>
    
                    </div>
    
                </div>
    
            </div>
    
        </a>
    </div>

    <!-- ==========================
         Today's Attendance
    ========================== -->

    <div class="col-xl-3 col-md-6">
    
        <a href="{{ url_for('attendance.mark_attendance') }}" class="text-decoration-none">
    
            <div class="card stats-card">
    
                <div class="card-body">
    
                    <div class="stats-content">
    
                        <p class="stats-label">
    
                            Today's Attendance
    
                        </p>
    
                        <div class="attendance-summary">
    
                            <div class="attendance-item">
    
                                <span class="attendance-value">
    
                                    {{ present_today }}
    
                                </span>
    
                                <span class="attendance-label">
    
                                    Present
    
                                </span>
    
                            </div>
    
                            <div class="attendance-item">
    
                                <span class="attendance-value">
    
                                    {{ absent_today }}
    
                                </span>
    
                                <span class="attendance-label">
    
                                    Absent
    
                                </span>
    
                            </div>
    
                        </div>
    
                        <span class="stats-footer">
    
                            Mark Attendance
    
                            <i class="bi bi-arrow-right"></i>
    
                        </span>
    
                    </div>
    
                    <div class="stats-icon attendance-icon">
    
                        <i class="bi bi-calendar-check"></i>
    
                    </div>
    
                </div>
    
            </div>
    
        </a>
    </div>

</div>
