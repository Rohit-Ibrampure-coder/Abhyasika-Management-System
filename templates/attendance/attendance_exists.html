<!DOCTYPE html>
<html>

<head>

    <title>Attendance Already Exists</title>

</head>

<body>

    <h2>

        Attendance Already Marked

    </h2>

    <p>

        Attendance for

        <strong>{{ attendance_date }}</strong>

        has already been marked.

    </p>

    <br>

    <a
        href="{{ url_for(
            'attendance.view_attendance',
            attendance_date=attendance_date,
            abhyasika_id=abhyasika_id
        ) }}"
    >

        View Attendance

    </a>

    <br><br>

    <a
        href="{{ url_for(
            'attendance.edit_attendance',
            attendance_date=attendance_date,
            abhyasika_id=abhyasika_id
        ) }}"
    >

        Edit Attendance

    </a>
    <br><br>

    <a
        href="{{ url_for('attendance.mark_attendance') }}"
    >

        Back

    </a>

</body>

</html>
