<!DOCTYPE html>
<html>

<head>

    <title>

        View Attendance

    </title>

</head>

<body>

    <h1>

        View Attendance

    </h1>

    <p>

        Attendance Date :

        <b>

            {{ attendance_date }}

        </b>

    </p>

    <table border="1" cellpadding="8">

        <tr>

            <th>

                Student Name

            </th>

            <th>

                Standard

            </th>

            <th>

                Status

            </th>

        </tr>

        {% for attendance, student in attendance_list %}

        <tr>

            <td>

                {{ student.student_name }}

            </td>

            <td>

                {{ student.standard }}

            </td>

            <td>

                {{ attendance.status }}

            </td>

        </tr>

        {% endfor %}

    </table>

    <br>

    <a href="{{ url_for(
        'attendance.edit_attendance',
        attendance_date=attendance_date,
        abhyasika_id=abhyasika_id
        ) }}">

        Edit Attendance

    </a>

    <br><br>

    <a href="{{ url_for(
'attendance.mark_attendance'
) }}">

        Back

    </a>

</body>

</html>
